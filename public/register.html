<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Register Student</h2>

<form id="registerForm">

<input type="text" id="student_id" placeholder="Student ID" required>

<input type="text" id="name" placeholder="Name" required>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<p>
Already registered? <a href="index.html">Login</a>
</p>

</div>

<script>

document.getElementById("registerForm").addEventListener("submit", async e => {
    e.preventDefault();

    // Correctly fetching values from the form inputs
    const student_id = document.getElementById("student_id").value;
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const data = { student_id, name, email, password };

    try {
        const res = await fetch("/register", { // Added await
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json(); // Added await
        alert(result.message);

        if (res.ok) {
            window.location.href = "index.html"; // Redirect to login page on success
        }
    } catch (err) {
        console.error("Registration error:", err);
        alert("Failed to connect to the server.");
    }
});

</script>

</body>
</html>
